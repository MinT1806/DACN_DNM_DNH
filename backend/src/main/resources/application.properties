# ============= Server Configuration =============
server.port=8080

# ============= Database Configuration =============
# Railway PostgreSQL - Replace with your own database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/abcenglish?characterEncoding=UTF-8&options=-c%20client_encoding=UTF8}
spring.datasource.hikari.connectionInitSql=SET TIME ZONE 'UTC'
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.prependQueryGeometryToSetClause=false
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true

# ============= JPA Configuration =============
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.connection.characterEncoding=utf8
spring.jpa.properties.hibernate.connection.useUnicode=true

# ============= SQL Init (Auto Migration) =============
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ============= JWT Configuration =============
app.jwtSecret=${JWT_SECRET:abcEnglishSecretKey2024VeryLongAndSecureKeyForJWTSigning}
app.jwtExpirationMs=86400000

# ============= Groq AI Configuration =============
# Get your API key at https://console.groq.com
app.groq-api-key=${GROQ_API_KEY:your_groq_api_key_here}
groq.api.key=${app.groq-api-key}
groq.api.model=llama-3.1-8b-instant

# ============= Email Configuration =============
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@example.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============= Redis Configuration (Optional) =============
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Disable Redis health check (Redis is optional)
management.health.redis.enabled=false
management.health.defaults.enabled=true

# ============= File Upload Configuration =============
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============= Logging =============
logging.level.root=INFO
logging.level.com.abcenglish=DEBUG
logging.level.org.springframework.security=INFO

# ============= CORS Configuration =============
app.base-url=${APP_BASE_URL:http://localhost:3001}
