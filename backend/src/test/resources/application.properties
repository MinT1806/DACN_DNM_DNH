# Test configuration
spring.application.name=abc-english-test

# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA settings for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# DisableFlyway for tests
spring.flyway.enabled=false

# JWT Configuration
app.jwtSecret=testSecretKeyForUnitTestingPurposeOnly123456789012345678901234567890
app.jwtExpirationMs=86400000

# Groq API - mock in tests
groq.api.key=test_groq_key
groq.api.model=llama-3.1-8b-instant

# Disable actuator in tests
spring.autoconfigure.exclude=org.springframework.boot.actuate.autoconfigure.EndpointAutoConfiguration

# Server port
server.port=0
